<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Character Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-card">
        <h2 class="form-title">Send Message</h2>
        <p class="limit-info">Maximum allowed: 200 characters</p>
        
        <div class="input-group">
            <textarea id="messageBox" placeholder="Type your message here..." maxlength="200"></textarea>
            
            <div class="counter-container">
                <span id="charCount">0 / 200 characters</span>
            </div>
            
            <p id="warningMsg" class="warning">Character limit reached!</p>
        </div>

        <button id="sendBtn">Send Message</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
